<section id="episode-library" class="page">
  <div class="section-inner">
    <h2 class="section-title">Already Phucked</h2>
    
    <div class="episode-grid">
      {% for ep in site.episodes %}
        <article class="episode-card card">
          <h3>{{ ep.title }} (S{{ ep.season }} E{{ ep.episode_number }})</h3>
          <p>{{ ep.content | strip_html | truncate: 100 }}</p>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
