<section id="guest-directory" class="page">
  <div class="section-inner">
    <h2 class="section-title">Phucked Up Folks</h2>
    <div class="guest-grid">
      {% for guest in site.guests %}
        <article class="guest-card glass-card">
          <h3>{{ guest.name }}</h3>
          <p>{{ guest.occupation }}</p>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
