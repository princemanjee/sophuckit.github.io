<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
</head>
<body class="{{ page.body_class }}">
  
  <div style="background: #00FF00; color: black; padding: 10px; text-align: center; font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
    BUILD STABLE | VERSION 2.1 | {{ "now" | date: "%H:%M:%S" }}
  </div>

  <header id="site-header" style="margin-top: 50px;">
    <div class="nav-inner">
      <a class="logo" onclick="showPage('hero')">
        <span class="logo-main">Sophuckit</span>
        <span class="logo-sub">Podcast</span>
      </a>
      <ul class="nav-menu" id="nav-menu">
        {% for link in site.data.navigation.main %}
          <li>
            <a href="#" 
               class="nav-link {% if forloop.first %}active{% endif %}" 
               data-section="{{ link.section }}" 
               onclick="showPage('{{ link.section }}');return false;">
               {{ link.title }}
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  </header>

  <main id="app">
    {{ content }}
  </main>

  <script src="{{ "/assets/js/main.js" | relative_url }}"></script>
</body>
</html>
