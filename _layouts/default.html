<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  
  <!-- Robust pathing for GitHub Pages -->
  <link rel="stylesheet" href="{{ "/assets/css/style.css" | relative_url }}">
</head>
<body class="{{ page.body_class }}">
  
  <!-- VISIBLE UPDATE MARKER -->
  <div style="background: yellow; color: black; padding: 10px; text-align: center; font-weight: bold; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">
    JEKYLL ACTIVE | Built: {{ "now" | date: "%H:%M:%S" }}
  </div>

  <header id="site-header" style="margin-top: 40px;">
    <div class="nav-inner">
      <a class="logo" onclick="showPage('hero')">
        <span class="logo-main">Sophuckit</span>
        <span class="logo-sub">Podcast</span>
      </a>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="#" class="nav-link active" data-section="hero" onclick="showPage('hero')">Hero</a></li>
        <li><a href="#" class="nav-link" data-section="episode-library" onclick="showPage('episode-library')">Episodes</a></li>
        <li><a href="#" class="nav-link" data-section="about" onclick="showPage('about')">About</a></li>
        <li><a href="#" class="nav-link" data-section="host-bios" onclick="showPage('host-bios')">Hosts</a></li>
        <li><a href="#" class="nav-link" data-section="subscribe" onclick="showPage('subscribe')">Subscribe</a></li>
        <li><a href="#" class="nav-link" data-section="guest-directory" onclick="showPage('guest-directory')">Guests</a></li>
        <li><a href="#" class="nav-link" data-section="sponsor" onclick="showPage('sponsor')">Sponsor</a></li>
        <li><a href="#" class="nav-link" data-section="contact" onclick="showPage('contact')">Contact</a></li>
        <li><a href="#" class="nav-link" data-section="newsletter" onclick="showPage('newsletter')">Newsletter</a></li>
        <li><a href="#" class="nav-link" data-section="store" onclick="showPage('store')">Store</a></li>
      </ul>
    </div>
  </header>

  <main id="app">
    {{ content }}
  </main>

  <script src="{{ "/assets/js/main.js" | relative_url }}"></script>
</body>
</html>
