---
layout: default
---
<div class="section-inner" style="margin-top: 10rem; margin-bottom: 5rem;">
  <div class="guest-card glass-card" style="max-width: 800px; margin: 0 auto;">
    <h1 style="color: var(--accent); font-family: 'OPTICopperplate', serif; margin-bottom: 1rem;">{{ page.name }}</h1>
    <p class="caption" style="margin-bottom: 2rem;">{{ page.occupation }}</p>
    
    <div class="guest-content">
      {{ content }}
    </div>

    <div style="margin-top: 3rem; border-top: 1px solid var(--glass-border); padding-top: 2rem;">
      <a href="{{ "/" | relative_url }}" class="btn-secondary">← Back to Directory</a>
    </div>
  </div>
</div>
