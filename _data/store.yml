title: "Phuck Shit"
lead: "Wear the brand. Fund the chaos."
body: |
  Every shirt, hoodie, and piece of merch you buy keeps the lights on,
  the microphones hot, and Soph caffeinated enough to get through
  another episode. This is how independent media survives — people
  who give a shit buying things from people who give a shit.

  Plus you get to walk around in public wearing something that will
  absolutely start a conversation. Or end one.
  Godfather approves of this.

