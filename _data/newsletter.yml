title: "Join The Cult"
lead: "This isn't a newsletter. It's a dispatch."
body: |
  The stuff that doesn't make it onto the podcast. The threads we're
  pulling. The things we've found that we're not ready to say out loud
  yet. Insider access for people who are already too far down the rabbit
  hole to turn back.

  We don't spam. We don't sell your email. We write it when we have
  something worth saying — and we always have something worth saying.
  Soph will make you laugh. Godfather will make you paranoid.
  Both are correct responses.

perks:
  - "Early episode access and behind-the-scenes breakdowns"
  - "Deep dives that didn't make the final cut"
  - "Direct from Soph and Godfather — no PR filter, obviously"
  - "The occasional classified-adjacent rant from Godfather"

form:
  title: "Get the Dispatch"
  subtitle: "One field. No bullshit. Just your email."
  hint: |
    No spam. No schedule. Just the truth when we have it.
    Unsubscribe whenever — we'll survive.
  confirm:
    title: "You're In."
    body: |
      Don't make us regret it. Soph will write it.
      Godfather will edit it. It'll land in your inbox when it lands.
      We don't do schedules.
