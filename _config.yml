title: Sophuckit Podcast
url: "https://princemanjee.github.io"
baseurl: "/sophuckit.github.io"

# Force 2026 dates to show
future: true

collections:
  episodes:
    output: true
  guests:
    output: true
  hosts:
    output: true
  seasons:
    output: true

defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: ""
      type: "episodes"
    values:
      layout: "episode"

markdown: kramdown
# Do NOT define a theme here, we use our own layouts
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package-lock.json
  - .jekyll-cache
  - .sass-cache
