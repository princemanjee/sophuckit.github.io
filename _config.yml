title: Sophuckit Podcast
description: "No-holds-barred investigative comedy. We expose corruption, hypocrisy, and evil with savage wit. Adults only."
tagline: "Exposing the Phucking Truth."
baseurl: "" 
url: "https://princemanjee.github.io"

# Meta / SEO
meta:
  og_image: "/assets/images/sophuckit.jpg"
  twitter_handle: "@sophuckit"

collections:
  episodes:
    output: true
  guests:
    output: true
  hosts:
    output: true
  seasons:
    output: true

defaults:
  - scope:
      path: ""
      type: "episodes"
    values:
      layout: "episode"
  - scope:
      path: ""
      type: "guests"
    values:
      layout: "guest"

markdown: kramdown
theme: 
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package-lock.json
