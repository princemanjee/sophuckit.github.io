title: Sophuckit Podcast
description: "No-holds-barred investigative comedy. We expose corruption, hypocrisy, and evil with savage wit. Adults only."
tagline: "Exposing the Phucking Truth."
baseurl: "/sophuckit.github.io"
url: "https://princemanjee.github.io"

# CRITICAL: Allow 2026 dates to be displayed
future: true

collections:
  episodes:
    output: true
    permalink: /episodes/:path/
  guests:
    output: true
    permalink: /guests/:path/
  hosts:
    output: true
  seasons:
    output: true

defaults:
  - scope:
      path: ""
      type: "episodes"
    values:
      layout: "episode"
  - scope:
      path: ""
      type: "guests"
    values:
      layout: "guest"

markdown: kramdown
theme: jekyll-theme-minimal
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - package-lock.json
  - .jekyll-cache
  - .sass-cache
