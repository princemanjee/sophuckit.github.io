  const container = document.getElementById("outputs");
  container.innerHTML = "";


  for (let styleName in styles) {
    let result = "";

    if (typeof styles[styleName] === "function") {
      result = styles[styleName](this.value);

      for (let char of this.value) {
        let index = normal.indexOf(char);
        result += index !== -1 ? styles[styleName][index] : char;
      }

    wrapper.style.border = "1px solid #ccc";
    wrapper.style.padding = "10px";
    wrapper.style.marginBottom = "10px";
    wrapper.style.cursor = "pointer";
    wrapper.style.borderRadius = "8px";

    title.textContent = styleName;

    });

  }
